name: Build Tests

on:
  workflow_dispatch:
  push:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'external/**'
      - 'CMakeLists.txt'
      - 'conanfile.py'
      - 'conan/**'
      - 'version.txt'
  pull_request:
    branches: [ master ]
    paths:
      - 'src/**'
      - 'include/**'
      - 'external/**'
      - 'CMakeLists.txt'
      - 'conanfile.py'
      - 'conan/**'
      - 'version.txt'

jobs:
  build-test:
    runs-on: ${{ matrix.runs_on }}
    strategy:
      matrix:
        include:
          - os: windows
            build_type: Release
            runs_on: windows-latest
            configure_preset: conan-default
            build_preset: conan-release
          - os: windows
            build_type: Debug
            runs_on: windows-latest
            configure_preset: conan-default
            build_preset: conan-debug
          - os: linux
            build_type: Release
            runs_on: ubuntu-latest
            configure_preset: conan-release
            build_preset: conan-release
          - os: linux
            build_type: Debug
            runs_on: ubuntu-latest
            configure_preset: conan-debug
            build_preset: conan-debug

    steps:
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Setup MSVC environment
      if: matrix.os == 'windows'
      uses: ilammy/msvc-dev-cmd@v1

    - name: Detect Clang version
      id: clang-ver
      shell: bash
      run: |
        if [ "${{ matrix.os }}" == "windows" ]; then
          CLANG_BIN="clang-cl"
        else
          CLANG_BIN="clang"
        fi
        echo "value=$($CLANG_BIN --version | sed -n 's/.*version \([0-9]*\)\..*/\1/p' | head -1)" >> $GITHUB_OUTPUT

    - name: Setup Conan
      uses: conan-io/setup-conan@v1
      with:
        cache_packages: true

    - name: Add private artifactory
      run: |
        conan remote add artifactory ${{ secrets.ARTIFACTORY_URL }} --force
        conan remote login artifactory ci -p ${{ secrets.ARTIFACTS_TOKEN }}

    - name: Install dependencies
      run: conan install . --profile .conan/profiles/${{ matrix.os }}-ci -s compiler.version=${{ steps.clang-ver.outputs.value }} --build=missing -s build_type=${{ matrix.build_type }}

    - name: Configure and build
      shell: bash
      run: |
        cmake --preset ${{ matrix.configure_preset }}
        cmake --build --preset ${{ matrix.build_preset }} --config ${{ matrix.build_type }}

    - name: Build example
      working-directory: example
      run: conan create . --profile ../.conan/profiles/${{ matrix.os }}-ci -s compiler.version=${{ steps.clang-ver.outputs.value }} --build=missing -s build_type=${{ matrix.build_type }}
